<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Smart Product Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, .editor { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .editor { min-height: 150px; outline: none; border: 1px solid #ccc; background: #fafafa; }
        .btn { padding: 15px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
        label { font-weight: 600; color: #374151; display: block; margin-top: 10px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status-box { font-weight: bold; background: #f8fafc; cursor: default; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2 style="margin:0;">পণ্য আপলোড এডিটর</h2>
        <button id="authBtn" onclick="authenticate()" style="background:#ef4444; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">১. গুগল কানেক্ট করুন</button>
    </div>
    <hr>
    
    <div class="grid">
        <div><label>টাইটেল</label><input type="text" id="title" placeholder="পণ্যের নাম"></div>
        <div><label>ব্লগ আইডি</label><input type="text" id="blogId" class="status-box" readonly></div>
    </div>

    <div class="grid">
        <div><label>রেগুলার প্রাইস</label><input type="number" id="oldP" placeholder="৳"></div>
        <div><label>ডিস্কাউন্ট প্রাইস</label><input type="number" id="newP" placeholder="৳"></div>
    </div>
    
    <label>প্রধান ছবি (ImgBB অটো আপলোড)</label>
    <input type="file" onchange="uploadImg(this, 'mainUrl')">
    <input type="text" id="mainUrl" class="status-box" placeholder="আপলোড হলে এখানে লিঙ্ক আসবে..." readonly>

    <label>গ্যালারি ছবি (সবগুলো অটো আপলোড হবে)</label>
    <div class="grid">
        <input type="file" onchange="uploadImg(this, 'g1')">
        <input type="file" onchange="uploadImg(this, 'g2')">
        <input type="file" onchange="uploadImg(this, 'g3')">
        <input type="file" onchange="uploadImg(this, 'g4')">
    </div>
    <input type="hidden" id="g1"> <input type="hidden" id="g2"> <input type="hidden" id="g3"> <input type="hidden" id="g4">

    <label>বর্ণনা (Bold/Italic/List)</label>
    <div class="editor" id="desc" contenteditable="true"></div>

    <button class="btn" id="publishBtn" onclick="publishPost()">পাবলিশ পোস্ট</button>
</div>

<script>
    const IMGBB_KEY = '546dc91089a1748769faf7c52864a57d'; 
    const CLIENT_ID = '918784071036-u63ihe5ihb5tc81t8ios82mfnk9f4hpa.apps.googleusercontent.com';
    const MY_BLOG_ID = '4774611601336584177';
    let token = null;

    // ১. সঠিক অথেন্টিকেশন ফাংশন
    function authenticate() {
        const redirectUri = window.location.origin + window.location.pathname;
        const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/blogger`;
        window.location.href = authUrl;
    }

    // ২. পেজ লোড হলেই ব্লগ আইডি সেট করা এবং কানেকশন চেক করা
    window.onload = () => {
        document.getElementById('blogId').value = MY_BLOG_ID;
        
        // URL থেকে টোকেন বের করা
        const params = new URLSearchParams(window.location.hash.substring(1));
        token = params.get('access_token');

        if (token) {
            const authBtn = document.getElementById('authBtn');
            authBtn.innerText = "গুগল কানেক্টেড ✅";
            authBtn.style.background = "#10b981";
            // ক্লিন URL করতে চাইলে নিচের লাইনটি ব্যবহার করা যায়
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    };

    // ৩. স্মার্ট ইমেজ আপলোড (নো পপ-আপ)
    async function uploadImg(input, targetId) {
        if(!input.files[0]) return;
        
        const targetField = document.getElementById(targetId) || { value: "" };
        const statusDisplay = document.getElementById('mainUrl'); // মেইন বক্সে স্ট্যাটাস দেখাবে
        statusDisplay.value = "⏳ আপলোড হচ্ছে... দয়া করে অপেক্ষা করুন";
        statusDisplay.style.color = "#2563eb";

        const formData = new FormData();
        formData.append('image', input.files[0]);
        
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
            const data = await res.json();
            if(data.success) {
                if(document.getElementById(targetId)) document.getElementById(targetId).value = data.data.url;
                statusDisplay.value = "✅ ছবি আপলোড সফল!";
                statusDisplay.style.color = "#10b981";
                // ৩ সেকেন্ড পর আসল লিঙ্ক দেখাবে
                setTimeout(() => { statusDisplay.value = data.data.url; }, 2000);
            }
        } catch (err) {
            statusDisplay.value = "❌ আপলোড ব্যর্থ!";
            statusDisplay.style.color = "#ef4444";
        }
    }

    // ৪. পাবলিশ ফাংশন
    async function publishPost() {
        if(!token) {
            alert("আগে ১ নম্বর বাটন ক্লিক করে গুগল কানেক্ট করুন!");
            return;
        }

        const title = document.getElementById('title').value;
        const mainImg = document.getElementById('mainUrl').value;
        const newPrice = document.getElementById('newP').value;
        
        if(!title || !mainImg || !newPrice) {
            alert("টাইটেল, ছবি এবং দাম ফাঁকা রাখা যাবে না!");
            return;
        }

        let gal = '';
        for(let i=1; i<=4; i++) {
            let l = document.getElementById('g'+i).value;
            if(l) gal += `<img src="${l}" style="width:70px; margin:5px; border-radius:5px; border:1px solid #ddd;">`;
        }

        const content = `
            <div style="border:1px solid #eee; padding:20px; border-radius:10px; text-align:center;">
                <img src="${mainImg}" style="width:100%; border-radius:10px;">
                <div style="margin-top:10px;">${gal}</div>
                <h2>${title}</h2>
                <p style="color:#2563eb; font-size:24px; font-weight:bold;">মূল্য: ${newPrice}৳</p>
                <div style="text-align:left;">${document.getElementById('desc').innerHTML}</div>
                <br>
                <button style="background:#2563eb; color:#fff; padding:15px 30px; border:none; border-radius:5px; font-size:18px; cursor:pointer; width:100%;">অর্ডার করতে এখানে ক্লিক করুন</button>
            </div>
        `;

        try {
            const res = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${MY_BLOG_ID}/posts/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, content: content })
            });
            
            if(res.ok) {
                alert("অভিনন্দন! সফলভাবে ব্লগে পোস্ট হয়েছে।");
            } else {
                alert("এরর: আপনার গুগল কানেকশন এক্সপায়ার হয়েছে। আবার ১ নম্বর বাটনে ক্লিক করুন।");
            }
        } catch (err) {
            alert("নেটওয়ার্ক এরর! আবার চেষ্টা করুন।");
        }
    }
</script>
</body>
</html>
