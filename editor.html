<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Pro Product Manager (ImgBB Auto)</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, .editor { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .editor { min-height: 150px; outline: none; border: 1px solid #ccc; background: #fafafa; }
        .btn { padding: 15px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
        .btn:hover { background: #1d4ed8; }
        label { font-weight: 600; color: #374151; display: block; margin-top: 10px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .upload-status { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2 style="margin:0;">পণ্য আপলোড এডিটর</h2>
        <button id="authBtn" onclick="authenticate()" style="background:#ef4444; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">১. গুগল কানেক্ট করুন</button>
    </div>
    <hr>
    <div class="grid">
        <div><label>টাইটেল</label><input type="text" id="title" placeholder="পণ্যের নাম"></div>
        <div><label>ব্লগ আইডি (Blogger)</label><input type="text" id="blogId" readonly></div>
    </div>
    <div class="grid">
        <div><label>রেগুলার প্রাইস</label><input type="number" id="oldP" placeholder="৳"></div>
        <div><label>ডিস্কাউন্ট প্রাইস</label><input type="number" id="newP" placeholder="৳"></div>
    </div>
    
    <label>প্রধান ছবি (ImgBB অটো আপলোড)</label>
    <input type="file" onchange="uploadImg(this, 'mainUrl')">
    <input type="text" id="mainUrl" class="upload-status" placeholder="ছবির লিঙ্ক এখানে আসবে..." readonly>

    <label>গ্যালারি ছবি (সর্বোচ্চ ৪টি)</label>
    <div class="grid">
        <input type="file" onchange="uploadImg(this, 'g1')">
        <input type="file" onchange="uploadImg(this, 'g2')">
        <input type="file" onchange="uploadImg(this, 'g3')">
        <input type="file" onchange="uploadImg(this, 'g4')">
    </div>
    <input type="hidden" id="g1"> <input type="hidden" id="g2"> <input type="hidden" id="g3"> <input type="hidden" id="g4">

    <label>বর্ণনা (Bold/Italic/List)</label>
    <div class="editor" id="desc" contenteditable="true" placeholder="পণ্যের বিস্তারিত লিখুন..."></div>

    <button class="btn" id="publishBtn" onclick="publishPost()">পাবলিশ/আপডেট পোস্ট</button>
</div>

<script>
    const IMGBB_KEY = '546dc91089a1748769faf7c52864a57d'; 
    const CLIENT_ID = '918784071036-u63ihe5ihb5tc81t8ios82mfnk9f4hpa.apps.googleusercontent.com';
    const MY_BLOG_ID = '4774611601336584177';
    let token = null;

    function authenticate() {
        window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${window.location.href.split('#')[0]}&response_type=token&scope=https://www.googleapis.com/auth/blogger`;
    }

    window.onload = () => { 
        document.getElementById('blogId').value = MY_BLOG_ID;
        if(window.location.hash) {
            token = window.location.hash.split('&')[0].split('=')[1];
            if(token) {
                const authBtn = document.getElementById('authBtn');
                authBtn.innerText = "গুগল কানেক্টেড ✅";
                authBtn.style.background = "#10b981";
            }
        }
    };

    // স্মার্ট ইমেজ আপলোড ফাংশন (কোনো পপ-আপ ছাড়া)
    async function uploadImg(input, targetId) {
        if(!input.files[0]) return;
        
        const targetField = document.getElementById(targetId);
        const originalPlaceholder = targetField.placeholder;
        targetField.value = "আপলোড হচ্ছে... একটু অপেক্ষা করুন";
        targetField.style.color = "#2563eb";

        const formData = new FormData();
        formData.append('image', input.files[0]);
        
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: formData });
            const data = await res.json();
            if(data.success) {
                targetField.value = data.data.url;
                targetField.style.color = "#10b981";
            }
        } catch (err) {
            targetField.value = "আপলোড ব্যর্থ!";
            targetField.style.color = "#ef4444";
        }
    }

    async function publishPost() {
        if(!token) { alert("আগে গুগল কানেক্ট করুন!"); return; }

        const title = document.getElementById('title').value;
        const mainImg = document.getElementById('mainUrl').value;
        const newPrice = document.getElementById('newP').value;
        const oldPrice = document.getElementById('oldP').value;
        const description = document.getElementById('desc').innerHTML;

        if(!title || !mainImg || !newPrice) { alert("টাইটেল, ছবি এবং দাম দিন!"); return; }

        let gal = '';
        for(let i=1; i<=4; i++) {
            let l = document.getElementById('g'+i).value;
            if(l && l.includes('http')) gal += `<img src="${l}" style="width:70px; height:70px; object-fit:cover; margin:5px; border-radius:8px; border:1px solid #ddd;">`;
        }

        const content = `
            <div class="product-container" style="max-width:600px; margin:auto; border:1px solid #eee; padding:15px; border-radius:10px;">
                <img src="${mainImg}" style="width:100%; border-radius:10px;">
                <div style="display:flex; justify-content:center; margin:10px 0;">${gal}</div>
                <h2 style="color:#333;">${title}</h2>
                <p style="font-size:20px; color:#2563eb; font-weight:bold;">মূল্য: ${newPrice}৳ <span style="text-decoration:line-through; color:#999; font-size:16px;">${oldPrice}৳</span></p>
                <div style="margin-top:15px; line-height:1.6;">${description}</div>
                <hr>
                <button style="width:100%; padding:15px; background:#2563eb; color:#fff; border:none; border-radius:8px; font-size:18px; cursor:pointer;">অর্ডার করতে এখানে ক্লিক করুন</button>
            </div>
        `;

        const res = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${MY_BLOG_ID}/posts/`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, content: content })
        });
        
        if(res.ok) { alert("সফলভাবে পোস্ট হয়েছে!"); } else { alert("পোস্ট করা যায়নি।"); }
    }
</script>
</body>
</html>
